services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=reviewpulse_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres_secure_pass
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgres://postgres:postgres_secure_pass@db:5432/reviewpulse_db
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=django-insecure-dev-key-pulse-review-2026
      - DEBUG=True
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - db
      - redis

  celery:
    build: .
    command: celery -A core worker --loglevel=info --concurrency=4
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgres://postgres:postgres_secure_pass@db:5432/reviewpulse_db
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=django-insecure-dev-key-pulse-review-2026
      - DEBUG=True
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - db
      - redis

  frontend:
    build: ./frontend
    ports:
      - "3000:5173"
    environment:
      - VITE_API_URL=http://localhost:8000/api
    depends_on:
      - web

volumes:
  postgres_data:
